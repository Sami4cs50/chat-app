<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Chat</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="server-icon">#</span>
        <h1>Global Chat</h1>
      </div>

      <div class="online-count">
        <span class="status-dot"></span>
        <span id="online-count-text">Connecting...</span>
      </div>

      <div class="user-list-wrapper">
        <h2 class="user-list-title">Online</h2>
        <ul id="user-list" class="user-list"></ul>
      </div>

      <div class="sidebar-footer">
        <div class="current-user">
          <span id="current-user-avatar" class="avatar"></span>
          <div class="current-user-info">
            <span id="current-username">You</span>
            <span class="current-user-sub">Anonymous session</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <header class="chat-header">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle user list">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"></path>
          </svg>
        </button>
        <span class="hash">#</span>
        <span>global</span>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>

      <div id="typing-indicator" class="typing-indicator" aria-live="polite"></div>

      <footer class="composer">
        <div class="composer-box">
          <textarea
            id="message-input"
            placeholder="Message #global"
            maxlength="500"
            rows="1"
            aria-label="Message input"
          ></textarea>
          <button id="send-button" aria-label="Send message">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M2 21l21-9L2 3v7l15 2-15 2z"></path>
            </svg>
          </button>
        </div>
        <div class="composer-meta">
          <span id="char-counter">0 / 500</span>
          <span id="composer-warning" class="composer-warning"></span>
        </div>
      </footer>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
